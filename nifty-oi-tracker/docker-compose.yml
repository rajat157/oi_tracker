services:
  postgres:
    image: postgres:16-alpine
    container_name: nifty-oi-postgres
    environment:
      POSTGRES_DB: nifty_oi
      POSTGRES_USER: nifty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifty -d nifty_oi"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: nifty-oi-postgres-test
    profiles: ["dev", "test"]
    environment:
      POSTGRES_DB: nifty_oi_test
      POSTGRES_USER: nifty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifty -d nifty_oi_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nifty-oi-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nifty:${POSTGRES_PASSWORD}@postgres:5432/nifty_oi
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nifty-oi-frontend
    profiles: ["prod"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
