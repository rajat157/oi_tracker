services:
  postgres:
    image: postgres:16-alpine
    container_name: nifty-oi-postgres
    environment:
      POSTGRES_DB: nifty_oi
      POSTGRES_USER: nifty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifty -d nifty_oi"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: nifty-oi-postgres-test
    environment:
      POSTGRES_DB: nifty_oi_test
      POSTGRES_USER: nifty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifty -d nifty_oi_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nifty-oi-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nifty:${POSTGRES_PASSWORD}@postgres:5432/nifty_oi
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend runs locally via `npm run dev` during development
  # Uncomment for production:
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: nifty-oi-frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

volumes:
  pgdata:
